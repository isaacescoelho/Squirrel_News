<html>
	<head>
		<title>Squirrel News</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" content="Squirrel News - The latest stories, all from your favorite furry journalist." />
		<meta name="robots" content="index, follow" />
		<link rel="stylesheet" href="../static/assets/css/main.css" />
		<noscript><link rel="stylesheet" href="../static/assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

					{% include "header.html" %}

				<!-- Main -->
					<div id="main">

						<!-- Posts -->
                        <h2>Results for "{{ query }}"</h2>

							<section class="posts">
								{% for article in results %}
									<article>
										<header>
											<span class="date">{{ article["date"] }}</span>
											<h2><a href="/article/{{ article['id'] }}">{{ article["title"] }}<br /></a></h2>
										</header>
										<a href="/article/{{ article['id'] }}" class="image fit" style="height: 200px; overflow: hidden; display: block;">
    										<img src='{{ "".join(article["image"].split()) }}' style="width: 100%; height: 100%; object-fit: cover;" alt=""/>
										</a>
										<p>{{ article["subtitle"] }}</p>
										<ul class="actions special">
											<li><a href="/article/{{ article['id'] }}" class="button">Full Story</a></li>
										</ul>
									</article>
								{% endfor %}
							</section>

					</div>

				<!-- Copyright -->
				{% include "footer.html" %}

<html>
	<head>
		<title>About us.</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="../static/assets/css/main.css" />
		<meta name="description" content="Squirrel News - The latest stories, all from your favorite furry journalist." />
		<meta name="robots" content="index, follow" />
		<noscript><link rel="stylesheet" href="../static/assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
				{% include "header.html" %}

				<!-- Main -->
					<div id="main">

						<!-- Post -->
							<section class="post">
								<header class="major">
									<span class="date">{{ article["date"] }}</span>
									<h1>{{ article["title"] }}<br />
									</h1>
									<p>{{ article["subtitle"] }}</p>
								</header>
								<div class="image main"><img src='{{ "".join(article["image"].split()) }}"' alt="" /></div>
								{{ article["body"] | safe }}
							</section>

					</div>

				<!-- Footer -->

				<!-- Copyright -->
					{% include "footer.html" %}

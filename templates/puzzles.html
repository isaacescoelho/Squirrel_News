<html>
	<head>
		<title>Squirrel News</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" content="Squirrel News - The latest stories, all from your favorite furry journalist." />
		<meta name="robots" content="index, follow" />
		<link rel="stylesheet" href="../static/assets/css/main.css" />
		<noscript><link rel="stylesheet" href="../static/assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper" class="fade-in">

				<!-- Intro -->
					<div id="intro">
						<h1>This is<br />
						Squirrel News</h1>
						<p>The news of all news, all made by a certain furry friend.</p>
						<ul class="actions">
							<li><a href="#header" class="button icon solid solo fa-arrow-down scrolly">Continue</a></li>
						</ul>
					</div>

					{% include "header.html" %}

				<!-- Main -->
					<div id="main">

						<!-- Featured Post -->
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 1rem;">
                        {% for puzzle in all_puzzles %}
                            <article style="margin: 0; background: #f0f0f0; border-radius: 12px; padding: 1.5rem; overflow: hidden;">
                                <header>
                                    <h2><a href='/{{ puzzle.replace(" ", "_") }}'>{{ puzzle }}<br /></a></h2>
                                </header>
                                <a href='/{{ puzzle.replace(" ", "_") }}' class="image fit" style="height: 200px; overflow: hidden; display: block;">
                                    <img src='{{ all_puzzles[puzzle] }}' style="width: 100%; height: 100%; object-fit: cover;" alt=""/>
                                </a>
                                <ul class="actions special">
                                    <li><a href='/{{ puzzle.replace(" ", "_") }}' class="button">Play</a></li>
                                </ul>
                            </article>
                        {% endfor %}
                        </div>

					</div>

				<!-- Copyright -->
				{% include "footer.html" %}
